name: 要闻汇总(每小时检查)

on:
  schedule:
    # 每小时检查一次 llmposts.com 的 WordPress REST API,有新文章才提交。
    # 故意避开整点:":00" 是 GitHub Actions 高负载时段,定时任务会被延迟甚至丢弃。
    # 公开仓库的 Actions 时长不计费,每小时跑无压力。
    - cron: "26 * * * *"
  workflow_dispatch: {} # 也可在 Actions 页面手动触发

# 让 Action 有权限把生成的文件提交回仓库
permissions:
  contents: write

# 避免两次运行同时提交
concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 脚本零依赖,只用 Node 内置模块,无需 npm install

      - name: 抓取并更新归档
        run: node scripts/generate.mjs

      - name: 提交变更
        run: |
          git config user.name  "llmposts-bot"
          git config user.email "actions@users.noreply.github.com"
          git add archive README.md
          if git diff --staged --quiet; then
            echo "没有新内容,跳过提交"
          else
            git commit -m "chore: 更新要闻汇总 ($(date -u +'%F %H:%M') UTC)"
            git push
          fi
