name: 每日要闻汇总

on:
  schedule:
    # 每天 09:00(北京时间)运行 —— cron 用 UTC,01:00 UTC = 09:00 CST。
    # 想更新更勤,再加一行 cron 即可(例如下午再跑一次)。
    - cron: "0 1 * * *"
  workflow_dispatch: {} # 也可在 Actions 页面手动触发

# 让 Action 有权限把生成的文件提交回仓库
permissions:
  contents: write

# 避免两次运行同时提交
concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装依赖
        run: npm install --no-audit --no-fund

      - name: 生成每日汇总
        run: node scripts/generate.mjs
        # 若把 RSS 地址放在仓库 Variables 里,取消下面注释:
        # env:
        #   RSS_URL: ${{ vars.RSS_URL }}

      - name: 提交变更
        run: |
          git config user.name  "llmposts-bot"
          git config user.email "actions@users.noreply.github.com"
          git add archive README.md
          if git diff --staged --quiet; then
            echo "没有新内容,跳过提交"
          else
            git commit -m "chore: 更新每日要闻汇总 ($(date -u +%F))"
            git push
          fi
