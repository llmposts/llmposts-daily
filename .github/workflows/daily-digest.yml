name: 要闻汇总(每小时检查)

on:
  schedule:
    # ⚠️ 临时:cron 改为每 5 分钟,用于测试 GitHub 是否会识别并触发定时任务。
    # 确认 schedule 能触发后,改回 "26 * * * *"(每小时第 26 分,避开整点高负载)。
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # 也可在 Actions 页面手动触发

# 让 Action 有权限把生成的文件提交回仓库
permissions:
  contents: write

# 避免两次运行同时提交
concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 脚本零依赖,只用 Node 内置模块,无需 npm install

      - name: 抓取并更新归档
        run: node scripts/generate.mjs

      - name: 提交变更
        run: |
          git config user.name  "llmposts-bot"
          git config user.email "actions@users.noreply.github.com"
          git add archive README.md
          if git diff --staged --quiet; then
            echo "没有新内容,跳过提交"
          else
            git commit -m "chore: 更新要闻汇总 ($(date -u +'%F %H:%M') UTC)"
            git push
          fi

      - name: 同步至飞书
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_WIKI_PARENT_NODE_TOKEN: ${{ secrets.FEISHU_WIKI_PARENT_NODE_TOKEN }}
        continue-on-error: true
        run: node scripts/sync-feishu.mjs

      - name: 提交飞书同步状态
        if: always()
        run: |
          git config user.name  "llmposts-bot"
          git config user.email "actions@users.noreply.github.com"
          if [ ! -f archive/feishu-sync.json ]; then
            echo "未生成 archive/feishu-sync.json,跳过提交"
            exit 0
          fi
          git add archive/feishu-sync.json
          if git diff --staged --quiet; then
            echo "飞书同步状态无变化,跳过提交"
          else
            git commit -m "chore: 更新飞书同步状态 ($(date -u +'%F %H:%M') UTC)"
            git push
          fi
